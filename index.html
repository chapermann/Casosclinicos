<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HandoffMed - Resumo Clínico</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .leito { transition: all 0.2s; }
    .leito:hover { transform: scale(1.05); }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<div class="max-w-7xl mx-auto p-4">
  <h1 class="text-3xl font-bold text-center text-blue-900 mb-8">HandoffMed - Resumo Clínico</h1>

  <!-- Leitos -->
  <div class="mb-8">
    <h2 class="text-xl font-semibold text-red-800 mb-3">Sala Vermelha (11 leitos)</h2>
    <div class="grid grid-cols-3 md:grid-cols-6 lg:grid-cols-11 gap-3" id="vermelha"></div>
  </div>

  <div>
    <h2 class="text-xl font-semibold text-orange-800 mb-3">Retaguarda Trauma (6 leitos)</h2>
    <div class="grid grid-cols-3 md:grid-cols-6 gap-3" id="retaguarda"></div>
  </div>

  <!-- Painel do Leito -->
  <div id="painel" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-4xl mx-4 max-h-[95vh] overflow-hidden">
      <div class="p-6 border-b">
        <h3 class="text-2xl font-bold" id="leito-title"></h3>
        <input type="text" id="prontuario" placeholder="Prontuário + Iniciais (ex: 655727 - MM)" 
               class="w-full mt-4 p-3 border rounded-lg focus:outline-none focus:border-blue-500">
      </div>

      <div class="p-6">
        <textarea id="evolucao" rows="10" 
                  class="w-full p-4 border rounded-lg focus:outline-none focus:border-blue-500"
                  placeholder="Cole aqui a evolução médica completa..."></textarea>
      </div>

      <div class="p-6 border-t bg-gray-50 flex flex-wrap gap-3">
        <label class="flex items-center gap-2">
          <input type="checkbox" id="alta" class="w-5 h-5">
          <span>Preenche critérios de alta para Enfermaria</span>
        </label>

        <button onclick="gerarResumo('completo')" 
                class="bg-blue-700 hover:bg-blue-800 text-white px-6 py-3 rounded-lg font-medium flex-1">
          📋 Gerar Resumo Completo (Round)
        </button>
        
        <button onclick="gerarResumo('passagem')" 
                class="bg-emerald-700 hover:bg-emerald-800 text-white px-6 py-3 rounded-lg font-medium flex-1">
          ⚡ Gerar Resumo Passagem de Plantão
        </button>
      </div>

      <div class="p-6 border-t max-h-[45vh] overflow-auto" id="resultado"></div>

      <div class="p-4 border-t flex justify-end gap-3 bg-gray-50">
        <button onclick="fecharPainel()" class="px-6 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">Fechar</button>
      </div>
    </div>
  </div>

  <!-- Histórico -->
  <div class="mt-12">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-semibold">Resumos Gerados - Plantão Atual</h2>
      <button onclick="exportarTXT()" 
              class="bg-gray-800 text-white px-5 py-2 rounded-lg hover:bg-black">
        📥 Exportar Tudo como TXT
      </button>
    </div>
    <div id="historico" class="space-y-4"></div>
  </div>
</div>

<script>
// ==================== CONFIGURAÇÃO API ====================
const API_URL = "https://nvidia-proxy.chapermann.workers.dev/";

// ==================== DADOS ====================
let leitos = [];
let historico = JSON.parse(localStorage.getItem('handoffHistorico')) || [];

// Criar leitos
function criarLeitos() {
  // Sala Vermelha
  const verm = document.getElementById('vermelha');
  for (let i = 1; i <= 11; i++) {
    leitos.push({id: `V${i}`, nome: `Vermelha ${i}`, tipo: 'vermelha', resumos: {}});
    verm.innerHTML += criarCardLeito(`V${i}`, `Vermelha ${i}`);
  }
  // Retaguarda
  const ret = document.getElementById('retaguarda');
  for (let i = 1; i <= 6; i++) {
    leitos.push({id: `R${i}`, nome: `Retaguarda ${i}`, tipo: 'retaguarda', resumos: {}});
    ret.innerHTML += criarCardLeito(`R${i}`, `Retaguarda ${i}`);
  }
}

function criarCardLeito(id, nome) {
  return `
    <div onclick="abrirLeito('${id}')" class="leito bg-white border border-gray-200 rounded-xl p-4 cursor-pointer hover:shadow-md">
      <div class="flex items-center gap-3">
        <div id="status-${id}" class="w-4 h-4 bg-red-500 rounded-full"></div>
        <div>
          <p class="font-semibold">${nome}</p>
        </div>
      </div>
    </div>`;
}

// ==================== FUNÇÕES ====================
function abrirLeito(id) {
  document.getElementById('painel').classList.remove('hidden');
  document.getElementById('leito-title').textContent = leitos.find(l => l.id === id).nome;
  document.getElementById('prontuario').value = '';
  document.getElementById('evolucao').value = '';
  document.getElementById('resultado').innerHTML = '';
  window.currentLeito = id;
}

function fecharPainel() {
  document.getElementById('painel').classList.add('hidden');
}

async function gerarResumo(tipo) {
  const leitoId = window.currentLeito;
  const prontuario = document.getElementById('prontuario').value.trim();
  const texto = document.getElementById('evolucao').value.trim();
  const alta = document.getElementById('alta').checked;

  if (!texto) {
    alert("Por favor, cole a evolução médica.");
    return;
  }

  const resultadoDiv = document.getElementById('resultado');
  resultadoDiv.innerHTML = `<p class="text-gray-500">Gerando resumo com IA...</p>`;

  const systemPrompt = tipo === 'completo' 
    ? `Você é um médico intensivista sênior. Elabore um Resumo Completo e bem estruturado para discussão em round médico. Use linguagem formal e profissional. Estrutura: Identificação, Antecedentes, Motivo da Internação, Evolução, Exames Relevantes, Exame Físico, Conduta Atual e Pendências.`
    : `Você é um médico intensivista. Elabore um resumo ultra-conciso (50-80 palavras) para passagem de plantão verbal. Texto fluido, formal e objetivo.`;

  try {
    const response = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "deepseek-ai/deepseek-v4-pro",
        messages: [
          { role: "system", content: systemPrompt },
          { role: "user", content: `Prontuário: ${prontuario}\n${alta ? "Preenche critérios de alta para Enfermaria.\n" : ""}Evolução:\n${texto}` }
        ],
        temperature: 0.7,
        max_tokens: 1200
      })
    });

    const data = await response.json();
    const resumo = data.choices?.[0]?.message?.content || "Erro ao gerar resumo.";

    resultadoDiv.innerHTML = `
      <div class="bg-gray-100 p-5 rounded-xl">
        <h4 class="font-bold mb-2">${tipo === 'completo' ? 'Resumo Completo - Round Médico' : 'Resumo para Passagem de Plantão'}</h4>
        <p class="whitespace-pre-wrap text-gray-800 leading-relaxed">${resumo}</p>
      </div>
      <button onclick="copiarResumo(this)" class="mt-4 bg-gray-700 text-white px-5 py-2 rounded-lg">Copiar Texto</button>
    `;

    // Salvar no histórico
    salvarHistorico(leitoId, prontuario, tipo, resumo);

  } catch (err) {
    resultadoDiv.innerHTML = `<p class="text-red-600">Erro na API: ${err.message}</p>`;
  }
}

function copiarResumo(btn) {
  const text = btn.parentElement.querySelector('p').textContent;
  navigator.clipboard.writeText(text);
  btn.textContent = "✅ Copiado!";
  setTimeout(() => btn.textContent = "Copiar Texto", 2000);
}

function salvarHistorico(leitoId, prontuario, tipo, resumo) {
  const entry = {
    data: new Date().toLocaleString('pt-BR'),
    leito: leitoId,
    prontuario: prontuario,
    tipo: tipo,
    resumo: resumo
  };
  historico.unshift(entry);
  localStorage.setItem('handoffHistorico', JSON.stringify(historico));
  renderHistorico();
}

function renderHistorico() {
  const div = document.getElementById('historico');
  div.innerHTML = historico.map(h => `
    <div class="bg-white border border-gray-200 rounded-xl p-4">
      <small class="text-gray-500">${h.data} - ${h.leito} - ${h.prontuario}</small>
      <p class="mt-2 text-sm whitespace-pre-wrap">${h.resumo}</p>
    </div>
  `).join('');
}

function exportarTXT() {
  if (historico.length === 0) return alert("Nenhum resumo gerado ainda.");
  
  let texto = `HandoffMed - Plantão ${new Date().toLocaleDateString('pt-BR')}\n\n`;
  historico.forEach(h => {
    texto += `=== ${h.leito} | ${h.prontuario} | ${h.tipo.toUpperCase()} ===\n`;
    texto += h.resumo + "\n\n";
  });

  const blob = new Blob([texto], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Handoff_Plantao_${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
}

// Inicializar
criarLeitos();
renderHistorico();
</script>

</body>
</html>
